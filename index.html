<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign of Life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #ddd;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 14px;
      padding: 24px;
    }

    h1 { font-size: 1.2rem; letter-spacing: 0.1em; color: #aaa; }

    #grid-canvas { border: 1px solid #2a2a2a; display: block; }

    /* ── status ── */
    #status-line { font-size: 0.85rem; color: #888; min-height: 1.2em; }

    /* ── rows ── */
    .row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }

    .row label { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }

    /* ── buttons ── */
    button {
      background: #1e1e1e;
      color: #ccc;
      border: 1px solid #3a3a3a;
      padding: 4px 12px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85rem;
    }
    button:hover:not(:disabled) { background: #2a2a2a; }
    button:disabled { opacity: 0.35; cursor: default; }

    /* ── text inputs ── */
    input[type="text"] {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #3a3a3a;
      padding: 3px 7px;
      font-family: monospace;
      font-size: 0.85rem;
    }

    #seed-display  { width: 90px; letter-spacing: 0.05em; }
    #input-delay   { width: 55px; }
    #share-input   { width: 340px; color: #888; }

    /* ── section labels ── */
    .section-label {
      font-size: 0.75rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 2px;
    }

    /* ── stats ── */
    #stats-live    { font-size: 0.8rem; color: #666; min-height: 1em; }
    #stats-summary { font-size: 0.8rem; color: #5a8f6a; min-height: 1em; }

    /* ── rules ── */
    #rules-list { display: flex; flex-direction: column; gap: 5px; }
    #rules-list label { cursor: pointer; font-size: 0.9rem; }
    #rules-list label:hover { color: #fff; }
    .rule-desc { font-size: 0.75rem; color: #444; margin-left: 20px; }

    hr { border: none; border-top: 1px solid #222; width: 100%; }
  </style>
</head>
<body>
  <h1>Sign of Life</h1>

  <canvas id="grid-canvas"></canvas>

  <div id="status-line">—</div>
  <div id="stats-live"></div>
  <div id="stats-summary"></div>

  <hr />

  <!-- Tick controls -->
  <div class="row">
    <button id="btn-next">Next Tick</button>
    <button id="btn-reset">Reset</button>
    <label>
      <input type="checkbox" id="toggle-auto" />
      Auto
    </label>
    <label>
      Delay (ms): <input type="text" id="input-delay" value="500" />
    </label>
  </div>

  <!-- Seed -->
  <div class="row">
    <span class="section-label" style="margin-bottom:0">Seed</span>
    <input type="text" id="seed-display" value="00000000" title="Enter hex seed and press Enter" />
    <button id="btn-new-seed">New Seed</button>
  </div>

  <!-- Share -->
  <div class="row">
    <span class="section-label" style="margin-bottom:0">Share</span>
    <input type="text" id="share-input" readonly placeholder="world code" />
    <button id="btn-copy">Copy</button>
    <button id="btn-load">Load</button>
  </div>

  <hr />

  <!-- Rules -->
  <div>
    <div class="section-label">Rules</div>
    <div id="rules-list"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
