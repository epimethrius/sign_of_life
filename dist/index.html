<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign of Life</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      color: #222;
      font-family: monospace;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* ── Page title ── */
    h1 { font-size: 1.2rem; letter-spacing: 0.12em; color: #555; }
    #app-version { font-size: 0.68rem; color: #bbb; letter-spacing: 0.06em; margin-top: 2px; }

    /* ── Section headers ── */
    .section-header {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: #aaa;
      border-bottom: 1px solid #ddd;
      padding-bottom: 4px;
      margin-bottom: 8px;
    }

    /* ── Inline labels (seed, share, etc.) ── */
    .inline-label {
      font-size: 0.7rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      flex-shrink: 0;
    }

    /* ── main layout: canvas + legend side by side ── */
    #world-area {
      display: flex;
      align-items: flex-start;
      gap: 20px;
    }

    #map-col { display: flex; flex-direction: column; gap: 6px; }

    /* Viewport wrapper — constrains layout footprint when canvas is CSS-scaled. */
    #map-viewport {
      position: relative;
      overflow: visible;
      /* width and height managed by JS (applyZoom) */
    }

    /* Stacked canvas container — WebGL terrain behind, 2D icons on top. */
    #canvas-container {
      position: relative;
      display: inline-block;
      border: 1px solid #ccc;
      /* transform: scale() and transform-origin set by JS */
    }
    #grid-canvas  { display: block; }
    #grid-icons   {
      display: block;
      position: absolute;
      top: 0; left: 0;
      pointer-events: none; /* mouse events pass through to WebGL canvas */
    }

    /* ── zoom controls ── */
    #zoom-controls {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: monospace;
      font-size: 0.78rem;
    }
    #zoom-controls button { padding: 2px 8px; }
    #zoom-level { min-width: 40px; text-align: center; color: #888; }

    /* ── overlay mode selector ── */
    #overlay-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; }
    #overlay-mode {
      font-family: monospace;
      font-size: 0.82rem;
      border: 1px solid #ccc;
      background: #f8f8f8;
      padding: 2px 6px;
      color: #333;
    }
    /* Colour key for overlay modes — hidden in normal mode */
    #overlay-key {
      display: none;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: #888;
    }
    #overlay-key.visible { display: flex; }
    .key-swatch {
      display: inline-block;
      width: 40px; height: 10px;
      border: 1px solid #ddd;
    }

    /* ── legend ── */
    #legend {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 210px;
    }
    .legend-group-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-top: 6px;
    }
    .legend-group-label:first-child { margin-top: 0; }
    .legend-row { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #555; }
    .legend-swatch { display: inline-block; width: 14px; height: 14px; border: 1px solid #ccc; flex-shrink: 0; }
    .legend-icon { width: 18px; text-align: center; flex-shrink: 0; font-size: 1rem; }

    /* ── status + stats ── */
    #status-line { font-size: 0.85rem; color: #777; min-height: 1.2em; }
    #stats-summary { font-size: 0.8rem; color: #3a7a4a; min-height: 1em; }

    /* ── population chart ── */
    #chart-canvas {
      display: block;
      width: 100%;
      max-width: 640px;
      height: 140px;
      border: 1px solid #e8e8e8;
      margin-top: 10px;
    }

    #stats-wrapper {
      border-collapse: collapse;
      font-size: 0.8rem;
      color: #555;
    }
    #stats-wrapper th {
      text-align: left;
      color: #aaa;
      font-weight: normal;
      padding: 0 16px 4px 0;
      border-bottom: 1px solid #ddd;
    }
    #stats-wrapper td { padding: 2px 16px 2px 0; color: #666; }
    #stats-wrapper td:first-child { color: #333; }

    /* ── trait evolution table ── */
    #trait-wrapper {
      border-collapse: collapse;
      font-size: 0.8rem;
      color: #555;
      margin-top: 8px;
    }
    #trait-wrapper th {
      text-align: left;
      color: #aaa;
      font-weight: normal;
      padding: 0 16px 4px 0;
      border-bottom: 1px solid #ddd;
    }
    #trait-wrapper td { padding: 2px 16px 2px 0; color: #666; }
    #trait-wrapper td:first-child { color: #333; }

    /* ── rows ── */
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
    .row label { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }

    /* ── buttons ── */
    button {
      background: #f0f0f0;
      color: #333;
      border: 1px solid #ccc;
      padding: 4px 12px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85rem;
    }
    button:hover:not(:disabled) { background: #e0e0e0; }
    button:disabled { opacity: 0.35; cursor: default; }

    /* ── inputs ── */
    input[type="text"], input[type="number"] {
      background: #f8f8f8;
      color: #333;
      border: 1px solid #ccc;
      padding: 3px 7px;
      font-family: monospace;
      font-size: 0.85rem;
    }
    #seed-display { width: 90px; letter-spacing: 0.05em; }
    #input-delay  { width: 55px; }
    #share-input  { width: 300px; color: #999; }
    input.pct     { width: 50px; }
    input.pop-n   { width: 44px; }

    /* ── initial population grid ── */
    #pop-grid {
      display: grid;
      grid-template-columns: repeat(4, auto);
      gap: 4px 16px;
      align-items: center;
      font-size: 0.85rem;
    }
    #pop-grid label { display: flex; align-items: center; gap: 6px; }

    /* ── terrain config ── */
    #terrain-config { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; font-size: 0.85rem; }
    #terrain-config label { display: flex; align-items: center; gap: 5px; }
    #soil-pct { color: #777; min-width: 70px; }

    /* ── rules section ── */
    #tag-filter { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .tag-btn {
      background: #f0f0f0;
      color: #999;
      border: 1px solid #ddd;
      padding: 2px 9px;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.75rem;
    }
    .tag-btn.active { color: #333; border-color: #aaa; background: #e0e0e0; }

    #rules-list { display: flex; flex-direction: column; gap: 8px; }
    .rule-entry { display: flex; flex-direction: column; gap: 2px; }
    .rule-entry.hidden { display: none; }
    .rule-entry > label { cursor: pointer; font-size: 0.9rem; }
    .rule-entry > label:hover { color: #000; }
    .rule-tags { display: flex; gap: 4px; margin-left: 20px; }
    .rule-tag { font-size: 0.65rem; color: #3a7a3a; border: 1px solid #8cc88c; padding: 0 5px; }
    .rule-desc { font-size: 0.75rem; color: #aaa; margin-left: 20px; }
    .rule-params { display: flex; gap: 12px; margin-left: 20px; margin-top: 3px; flex-wrap: wrap; }
    .param-label { font-size: 0.75rem; color: #777; display: flex; align-items: center; gap: 4px; }
    .param-input { width: 52px; }

    hr { border: none; border-top: 1px solid #e0e0e0; }

    /* ── cell tooltip ── */
    #cell-tooltip {
      position: fixed;
      pointer-events: none;
      background: #fff;
      border: 1px solid #ccc;
      padding: 6px 10px;
      font-family: monospace;
      font-size: 0.78rem;
      color: #333;
      line-height: 1.6;
      box-shadow: 0 2px 6px rgba(0,0,0,0.12);
      z-index: 999;
      white-space: nowrap;
    }
    #cell-tooltip.hidden { display: none; }
    .tt-layer { color: #aaa; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; }
    .tt-empty { color: #ccc; }
  </style>
  <script type="module" crossorigin src="./assets/index-B4ddCgvm.js"></script>
</head>
<body>
  <h1>Sign of Life</h1>
  <div id="app-version"></div>

  <!-- ── Map ── -->
  <section>
    <div class="section-header">Map</div>
    <div id="world-area">
      <div id="map-col">
        <!-- WebGL terrain canvas + transparent 2D icon overlay -->
        <div id="map-viewport">
          <div id="canvas-container">
            <canvas id="grid-canvas"></canvas>
            <canvas id="grid-icons"></canvas>
          </div>
        </div>
        <!-- Zoom controls -->
        <div id="zoom-controls">
          <button id="btn-zoom-out">−</button>
          <span id="zoom-level">100%</span>
          <button id="btn-zoom-in">+</button>
          <button id="btn-zoom-fit">fit</button>
        </div>
        <!-- Season / weather indicator -->
        <div id="season-display" style="font-size:0.82rem;color:#666;min-height:1.2em;margin-top:4px;"></div>
        <!-- Overlay mode selector -->
        <div id="overlay-row">
          <span class="inline-label">Overlay</span>
          <select id="overlay-mode">
            <option value="0">Normal</option>
            <option value="1">Age</option>
            <option value="2">Energy</option>
            <option value="3">Trait (Decay)</option>
          </select>
          <span id="overlay-key">
            <canvas class="key-swatch" id="key-swatch" width="80" height="10"></canvas>
            <span id="key-lo"></span> → <span id="key-hi"></span>
          </span>
        </div>
      </div>
      <div id="legend">
        <div id="legend-content"></div>
      </div>
    </div>
  </section>

  <!-- ── Controls ── -->
  <section>
    <div class="row">
      <button id="btn-next">Next Tick</button>
      <button id="btn-reset">Reset</button>
      <label>
        <input type="checkbox" id="toggle-auto" />
        Auto
      </label>
      <label>
        Delay (ms): <input type="text" id="input-delay" value="500" />
      </label>
    </div>
  </section>

  <!-- ── Statistics ── -->
  <section>
    <div class="section-header">Statistics</div>
    <div id="status-line">—</div>
    <table id="stats-wrapper">
      <thead>
        <tr>
          <th>Entity</th>
          <th>Population</th>
          <th>Births</th>
          <th>Deaths</th>
          <th>Death ratio</th>
        </tr>
      </thead>
      <tbody id="stats-table"></tbody>
    </table>
    <canvas id="chart-canvas"></canvas>
    <div id="stats-summary"></div>
  </section>

  <!-- ── Trait Evolution ── -->
  <section>
    <div class="section-header">Trait Evolution</div>
    <div class="row" style="margin-bottom:8px">
      <span class="inline-label">Species</span>
      <select id="trait-species" style="font-family:monospace;font-size:0.82rem;border:1px solid #ccc;background:#f8f8f8;padding:2px 6px;">
        <option value="1">🐇 Herbivore</option>
        <option value="2">🦊 Predator</option>
        <option value="3">🦝 Omnivore</option>
        <option value="4">🐟 Small Fish</option>
        <option value="5">🐠 Big Fish</option>
        <option value="6">🦅 Bird</option>
      </select>
    </div>
    <table id="trait-wrapper">
      <thead>
        <tr>
          <th>Trait</th>
          <th>Baseline</th>
          <th>Pop. avg</th>
          <th>Deviation</th>
          <th>Range (min–max)</th>
        </tr>
      </thead>
      <tbody id="trait-table"></tbody>
    </table>
  </section>

  <hr />

  <!-- ── Parameters ── -->
  <section>
    <div class="section-header">Parameters</div>

    <!-- Grid size -->
    <div style="margin-bottom:12px">
      <div class="inline-label" style="margin-bottom:6px;display:block">Grid size</div>
      <div class="row">
        <label>Size:
          <select id="grid-size" style="font-family:monospace;font-size:0.85rem;border:1px solid #ccc;background:#f8f8f8;padding:3px 6px;">
            <option value="10">10 × 10</option>
            <option value="15">15 × 15</option>
            <option value="20">20 × 20</option>
            <option value="25">25 × 25</option>
            <option value="30">30 × 30</option>
            <option value="40">40 × 40</option>
            <option value="50" selected>50 × 50</option>
          </select>
        </label>
      </div>
    </div>

    <!-- Initial population -->
    <div style="margin-bottom:12px">
      <div class="inline-label" style="margin-bottom:6px;display:block">Initial population</div>
      <div id="pop-grid">
        <label>🌿 Grass <input type="number" class="pop-n" id="pop-grass" value="250" min="0" max="999" /></label>
        <label>🌲 Tree <input type="number" class="pop-n" id="pop-tree" value="125" min="0" max="999" /></label>
        <label>🪷 Lily <input type="number" class="pop-n" id="pop-lily" value="50" min="0" max="999" /></label>
        <label>🐇 Herbivore <input type="number" class="pop-n" id="pop-herbivore" value="90" min="0" max="999" /></label>
        <label>🦊 Predator <input type="number" class="pop-n" id="pop-predator" value="10" min="0" max="999" /></label>
        <label>🦝 Omnivore <input type="number" class="pop-n" id="pop-omnivore" value="30" min="0" max="999" /></label>
        <label>🐟 Small Fish <input type="number" class="pop-n" id="pop-small-fish" value="200" min="0" max="999" /></label>
        <label>🐠 Big Fish <input type="number" class="pop-n" id="pop-big-fish" value="5" min="0" max="999" /></label>
        <label>🦅 Bird <input type="number" class="pop-n" id="pop-bird" value="10" min="0" max="999" /></label>
      </div>
    </div>

    <!-- Terrain composition -->
    <div>
      <div class="inline-label" style="margin-bottom:6px;display:block">Terrain composition</div>
      <div id="terrain-config">
        <label>Water %: <input type="number" class="pct" id="pct-water" value="15" min="0" max="100" /></label>
        <label>Rock %:  <input type="number" class="pct" id="pct-rock"  value="10" min="0" max="100" /></label>
        <label>Sand %:  <input type="number" class="pct" id="pct-sand"  value="10" min="0" max="100" /></label>
        <span id="soil-pct">Soil: 65%</span>
      </div>
    </div>
  </section>

  <!-- ── Seed & Share ── -->
  <section>
    <div class="section-header">Seed &amp; Share</div>
    <div class="row">
      <span class="inline-label">Seed</span>
      <input type="text" id="seed-display" value="00000000" title="Enter hex seed and press Enter" />
      <button id="btn-new-seed">New Seed</button>
    </div>
    <div class="row" style="margin-top:6px">
      <span class="inline-label">Share</span>
      <input type="text" id="share-input" readonly placeholder="world code" />
      <button id="btn-copy">Copy</button>
      <button id="btn-load">Load</button>
    </div>
  </section>

  <hr />

  <!-- ── Rules ── -->
  <section>
    <div class="section-header">Rules</div>
    <div id="tag-filter"></div>
    <div id="rules-list"></div>
  </section>

  <div id="cell-tooltip" class="hidden"></div>
</body>
</html>
